name: Docker CI

on: workflow_dispatch

jobs:
  docker:
    runs-on: [self-hosted, wsl-linux]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image
        run: docker build -f Dockerfile.distroless -t dockerfile-distroless .

      - name: Tag Docker image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker tag dockerfile-distroless ${{ secrets.DOCKER_USERNAME }}/nodeapp:$SHORT_SHA

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nodeapp:$SHORT_SHA
