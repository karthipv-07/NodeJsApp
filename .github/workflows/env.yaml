name: Environment Build

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Choose environment"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - production

jobs:
  Matrix:
    runs-on: [self-hosted, Linux]
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install dependencies
        run: npm install
        
      - name: Create .env files
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "PORT=${{ secrets.PORT }}" >> .env.production
            echo "APP=${{ secrets.APP_NAME }}" >> .env.production
          else
            echo "PORT=${{ secrets.PORT }}" >> .env.development
            echo "APP=${{ secrets.APP_NAME }}" >> .env.development
          fi

      - name: Run app with environment
        run: |
          node server.js ${{ github.event.inputs.environment }} &
          sleep 5
          curl http://localhost:8080/health
          pkill -f "node server.js"
