name: CI pipeline

on:
  push:
    branches: [main]

jobs:
  sonar:
    name: SonarQube Analysis
    runs-on: self-hosted
	
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
		
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v2
	with:
	  args: >
            -Dsonar.projectKey=NodeJsApp
            -Dsonar.sources=.
	env:
	  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
